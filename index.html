<style>
:root{
 --bg:#F5F6F8; --card:#FFFFFF; --ink:#16181D; --muted:#6B7280; --line:#E6E8EC;
 --google:#3367D6; --meta:#8A3FFC; --accent:#0F766E;
 --green:#0E9F6E; --greenbg:#E6F6EF; --amber:#B45309; --amberbg:#FCF1DE; --red:#C0322B; --redbg:#FBEAE9; --graybg:#EDEEF0;
 --radius:12px;
}
[data-theme=dark]{
 --bg:#13161B; --card:#1B1F26; --ink:#E9EBEF; --muted:#969DA8; --line:#2B3138;
 --green:#34D399; --greenbg:#102A20; --amber:#F0B45E; --amberbg:#2A2110; --red:#F87171; --redbg:#2A1614; --graybg:#23272E;
}
[data-theme=dark] .seg{background:#23272E}
[data-theme=dark] .seg button.on{background:#0F1216}
[data-theme=dark] input,[data-theme=dark] select{background:#0F1216;color:var(--ink);border-color:var(--line)}
[data-theme=dark] thead th{background:var(--card)}
[data-theme=dark] tbody tr:hover{background:#20242B}
[data-theme=dark] .mini,[data-theme=dark] .chartbox{background:var(--card)}
[data-theme=dark] .drawer .x{background:var(--card);color:var(--muted)}
[data-theme=dark] .tagp.google{background:#1E2A44;color:#7FA8F0}
[data-theme=dark] .tagp.meta{background:#2A1E44;color:#B795F5}
[data-theme=dark] .pill.Manter{background:#102A20;color:#34D399}
[data-theme=dark] .pill.Otimizar{background:#2A2110;color:#F0B45E}
[data-theme=dark] .pill.Pausar{background:#23272E;color:#9AA1AB}
[data-theme=dark] .drawer{box-shadow:-12px 0 40px rgba(0,0,0,.55)}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3,.num{font-family:'Space Grotesk',Inter,sans-serif}
.wrap{max-width:1180px;margin:0 auto;padding:20px 22px 80px}
header{display:flex;flex-wrap:wrap;align-items:center;gap:16px;justify-content:space-between;margin-bottom:6px}
.brand{display:flex;align-items:center;gap:12px}
.brand .dot{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--google),var(--meta));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-family:'Space Grotesk'}
.brand h1{font-size:19px;margin:0;letter-spacing:-.01em}
.brand p{margin:0;color:var(--muted);font-size:12px}
.seg{display:inline-flex;background:#ECEEF1;border-radius:10px;padding:3px;gap:2px}
.seg button{border:0;background:transparent;padding:7px 14px;border-radius:8px;font-weight:600;color:var(--muted);cursor:pointer;font-size:13px;font-family:Inter}
.seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}
.seg button.on[data-p=google]{color:var(--google)} .seg button.on[data-p=meta]{color:var(--meta)}
.themebtn{border:1px solid var(--line);background:var(--card);width:38px;height:38px;border-radius:10px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;padding:0}
.themebtn:hover{color:var(--ink)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 2px}
.chip{border:1px solid var(--line);background:var(--card);color:var(--muted);padding:5px 11px;border-radius:18px;font-size:12px;cursor:pointer;font-family:Inter;font-weight:500}
.chip.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.linkbtn{border:0;background:transparent;color:var(--accent);font-weight:600;cursor:pointer;font-size:12px;font-family:Inter;padding:4px 6px}
.cmpgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.up{color:var(--green)} .down{color:var(--red)}
@media(max-width:640px){.cmpgrid{grid-template-columns:1fr}}
nav.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin:18px 0 22px;flex-wrap:wrap}
nav.tabs button{border:0;background:transparent;padding:10px 14px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;font-size:14px;font-family:Inter}
nav.tabs button.on{color:var(--ink);border-bottom-color:var(--ink)}
.grid{display:grid;gap:14px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius)}
.kpi{padding:14px 16px}
.kpi .lab{color:var(--muted);font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px}
.kpi .val{font-size:25px;font-weight:700;margin-top:4px;letter-spacing:-.02em}
.kpi .sub{font-size:11.5px;color:var(--muted);margin-top:2px}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11.5px;font-weight:600}
.pill.Manter{background:var(--greenbg);color:var(--green)} .pill.Otimizar{background:var(--amberbg);color:var(--amber)} .pill.Pausar{background:var(--graybg);color:var(--muted)}
.tagp{font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:5px}
.tagp.google{background:#E7EEFC;color:var(--google)} .tagp.meta{background:#F0E7FE;color:var(--meta)}
.panel{padding:18px}
.panel h2{font-size:15px;margin:0 0 14px;letter-spacing:-.01em}
.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:12px}
input[type=search],select{font-family:Inter;font-size:13px;padding:8px 11px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink)}
input[type=search]{min-width:180px}
input[type=range]{accent-color:var(--accent)}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:9px 10px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap}
th:first-child,td:first-child,th.l,td.l{text-align:left}
thead th{color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;cursor:pointer;user-select:none;position:sticky;top:0;background:#fff;z-index:1}
tbody tr{cursor:pointer} tbody tr:hover{background:#FAFAFB}
.tblwrap{max-height:560px;overflow:auto;border-radius:10px}
.bar{height:6px;border-radius:4px;background:var(--line);overflow:hidden;min-width:46px;display:inline-block;vertical-align:middle}
.bar>i{display:block;height:100%}
.roasbadge{font-weight:700;font-family:'Space Grotesk'}
.drawer-bg{position:fixed;inset:0;background:rgba(20,24,32,.34);opacity:0;pointer-events:none;transition:.18s;z-index:40}
.drawer-bg.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100%;width:min(560px,94vw);background:var(--bg);box-shadow:-12px 0 40px rgba(0,0,0,.18);transform:translateX(100%);transition:.22s cubic-bezier(.4,0,.2,1);z-index:41;overflow-y:auto;padding:20px}
.drawer.open{transform:none}
.drawer .x{position:absolute;top:16px;right:16px;border:0;background:#fff;border:1px solid var(--line);width:32px;height:32px;border-radius:9px;cursor:pointer;font-size:16px;color:var(--muted)}
.minigrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.mini{background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 11px}
.mini .lab{font-size:10.5px;color:var(--muted);font-weight:500} .mini .val{font-size:16px;font-weight:700;margin-top:2px}
.chartbox{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px;margin:12px 0;position:relative}
.chartbox h3{font-size:12.5px;color:var(--muted);margin:0 0 8px;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.simrow{display:grid;grid-template-columns:130px 1fr 88px;align-items:center;gap:12px;margin:10px 0}
.simrow label{font-size:13px;color:var(--muted);font-weight:500}
.simrow .out{font-weight:700;text-align:right;font-family:'Space Grotesk'}
.simcards{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:6px}
.note{font-size:12px;color:var(--muted);margin-top:10px}
.callout{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.calist{margin:0;padding:0;list-style:none}
.calist li{display:flex;justify-content:space-between;gap:8px;padding:7px 0;border-bottom:1px dashed var(--line);font-size:13px}
.calist li:last-child{border-bottom:0}
.legend{font-size:11.5px;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap;margin-top:8px}
.legend span{display:flex;align-items:center;gap:5px} .legend i{width:10px;height:10px;border-radius:3px;display:inline-block}
@media(max-width:680px){.callout{grid-template-columns:1fr}.simrow{grid-template-columns:96px 1fr 70px}.minigrid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

function platsActive(){return state.plat==='both'?['google','meta']:[state.plat];}

function launchOrder(name){const M=['JAN','FEV','MAR','ABR','MAI'];const m=String(name).match(/LS-([A-Z]{3})26-?(\d+)?/);if(!m)return 999;return (M.indexOf(m[1]))*10+(+(m[2]||0));}
function launchList(){let s=new Set();platsActive().forEach(p=>DATA[p].launches.forEach(L=>s.add(L)));return [...s].sort((a,b)=>launchOrder(a)-launchOrder(b));}
function launchRows(L){let rows=[];platsActive().forEach(p=>{DATA[p].creatives.forEach(c=>{const s=c.series[L];if(s&&(s.c>0||s.l>0)){const roas=s.c>0?s.v*TICKET/s.c:0;const conv=s.l>0?s.v/s.l*100:0;const cpl=s.l>0?s.c/s.l:0;rows.push({code:c.code,plat:p,leads:s.l,vendas:s.v,custo:s.c,roas,conv,cpl});}});});return rows;}

function render(){

/* ---------- OVERVIEW ---------- */
function overviewHTML(){
 const t=totals();
 const kpis=[
  ['Investimento',fmtBRL(t.custo),''],
  ['Receita estimada',fmtBRL(t.receita),''],
  ['ROAS',t.roas.toFixed(2),'meta ≥ 2,00'],
  ['Vendas',fmtN(t.vendas),''],
  ['Leads',fmtN(t.leads),'CPL '+fmtBRL2(t.cpl)],
  ['Conversão',fmtPct(t.conv),'lead → venda'],
 ];
 const cr=allCreatives().filter(c=>c.vendas>0);
 const provados=cr.filter(c=>c.leads>=1000 && c.vendas>=10);
 const scale=[...provados].sort((a,b)=>b.roas-a.roas).slice(0,4);
 const cut=[...cr].filter(c=>c.roas<2 && c.leads>=500).sort((a,b)=>b.custo-a.custo).slice(0,4);
 let kp=kpis.map(k=>`<div class="card kpi"><div class="lab">${k[0]}</div><div class="val">${k[1]}</div><div class="sub">${k[2]||'&nbsp;'}</div></div>`).join('');
 const cmp = state.plat==='both' ? `<div class="card chartbox"><h3>Comparativo entre plataformas</h3><div style="position:relative;height:240px"><canvas id="cmpChart" role="img" aria-label="Comparativo de ROAS, CPL e conversão entre Google e Meta"></canvas></div><div class="legend"><span><i style="background:var(--google)"></i>Google</span><span><i style="background:var(--meta)"></i>Meta</span></div></div>` : '';
 return `<div class="grid kpis" style="margin-bottom:14px">${kp}</div>
  ${cmp}
  <div class="card chartbox"><h3>Onde está o investimento × ROAS (criativos com ≥ 500 leads · bolha = vendas)</h3><div style="position:relative;height:300px"><canvas id="bubbleChart" role="img" aria-label="Dispersão de criativos por investimento e ROAS"></canvas></div><div class="legend"><span><i style="background:var(--green)"></i>ROAS ≥ 3</span><span><i style="background:var(--amber)"></i>2–3</span><span><i style="background:var(--red)"></i>&lt; 2</span></div></div>
  <div class="callout">
   <div class="card panel"><h2 style="color:var(--green)">Escalar (alto ROAS)</h2><p class="note" style="margin:-8px 0 10px">Volume comprovado: ≥ 1.000 leads e ≥ 10 vendas</p><ul class="calist">${scale.map(c=>`<li><span><span class="tagp ${c.plat}">${c.plat==='google'?'G':'M'}</span> ${c.code}</span><span class="roasbadge" style="color:${roasColor(c.roas)}">${c.roas.toFixed(2)}</span></li>`).join('')}</ul></div>
   <div class="card panel"><h2 style="color:var(--red)">Cortar/otimizar (gasta muito, ROAS baixo)</h2><p class="note" style="margin:-8px 0 10px">Maior investimento com ROAS &lt; 2</p><ul class="calist">${cut.map(c=>`<li><span><span class="tagp ${c.plat}">${c.plat==='google'?'G':'M'}</span> ${c.code} · ${fmtBRL(c.custo)}</span><span class="roasbadge" style="color:${roasColor(c.roas)}">${c.roas.toFixed(2)}</span></li>`).join('')}</ul></div>
  </div>`;
}
function drawOverview(){
 if(state.plat==='both'){
  const g=DATA.google.totals,m=DATA.meta.totals;
  charts.push(new Chart(document.getElementById('cmpChart'),{type:'bar',
   data:{labels:['ROAS','CPL (R$)','Conversão (%)'],datasets:[
    {label:'Google',data:[g.roas,g.cpl,g.conv],backgroundColor:'#3367D6'},

function launchRowsMulti(Ls){
 let map={};
 platsActive().forEach(p=>DATA[p].creatives.forEach(c=>{
   let v=0,cc=0,l=0,any=false;
   Ls.forEach(L=>{const s=c.series[L];if(s){v+=s.v;cc+=s.c;l+=s.l;if(s.c>0||s.l>0)any=true;}});
   if(any){const roas=cc>0?v*TICKET/cc:0,conv=l>0?v/l*100:0,cpl=l>0?cc/l:0;map[p+'::'+c.code]={code:c.code,plat:p,leads:l,vendas:v,custo:cc,roas,conv,cpl};}
 }));
 return Object.values(map);
}
function kpiRow(t){return {roas:t.custo>0?t.vendas*TICKET/t.custo:0,cpl:t.leads>0?t.custo/t.leads:0,conv:t.leads>0?t.vendas/t.leads*100:0};}
function launchesHTML(){

   .map(x=>`<div class="card kpi"><div class="lab">${x[0]}</div><div class="val">${x[1]}</div><div class="sub">${x[2]||'&nbsp;'}</div></div>`).join('');

 const destHTML=dest.length?`<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr));margin-bottom:14px">${dest.map((c,i)=>`<div class="card kpi" style="border-left:3px solid var(--green)"><div class="lab">#${i+1} melhor ROAS <span class="tagp ${c.plat}">${c.plat==='google'?'G':'M'}</span></div><div class="val">${c.code}</div><div class="sub">ROAS <b style="color:${roasColor(c.roas)}">${c.roas.toFixed(2)}</b> · ${fmtN(c.vendas)} vendas · ${c.conv.toFixed(2)}%</div></div>`).join('')}</div>`:'';
 const cols=[['code','Criativo','l'],['custo','Invest.'],['leads','Leads'],['vendas','Vendas'],['conv','Conv.'],['cpl','CPL'],['roas','ROAS']];
 let srt=[...rows].sort((a,b)=>{let kk=state.sortL.key,d=state.sortL.dir,av=a[kk],bv=b[kk];if(typeof av==='string')return av.localeCompare(bv)*d;return (av-bv)*d;});
 const th=cols.map(c=>`<th class="${c[2]||''}" data-kl="${c[0]}">${c[1]}</th>`).join('');
 const body=srt.map(c=>{const low=c.leads<150;return `<tr data-code="${c.code}" data-plat="${c.plat}" ${low?'style="opacity:.55"':''}>

  </div>`;
}
function compareHTML(list){
 const optA=list.map(L=>`<option value="${L}" ${L===state.cmpA?'selected':''}>${L}</option>`).join('');
 const optB=list.map(L=>`<option value="${L}" ${L===state.cmpB?'selected':''}>${L}</option>`).join('');
 const A=launchRows(state.cmpA),B=launchRows(state.cmpB);
 const sum=rs=>{let t={custo:0,leads:0,vendas:0};rs.forEach(r=>{t.custo+=r.custo;t.leads+=r.leads;t.vendas+=r.vendas;});return Object.assign(t,kpiRow(t));};
 const ta=sum(A),tb=sum(B);
 const dv=(a,b,inv)=>{if(a===0)return '';const p=(b-a)/Math.abs(a)*100;const good=inv?p<0:p>0;const arrow=p>0?'▲':p<0?'▼':'';return `<span class="${good?'up':'down'}">${arrow} ${Math.abs(p).toFixed(0)}%</span>`;};
 const mrows=[
  ['ROAS',ta.roas.toFixed(2),tb.roas.toFixed(2),dv(ta.roas,tb.roas,false)],
  ['Vendas',fmtN(ta.vendas),fmtN(tb.vendas),dv(ta.vendas,tb.vendas,false)],
  ['Investimento',fmtBRL(ta.custo),fmtBRL(tb.custo),dv(ta.custo,tb.custo,false)],
  ['Conversão',fmtPct(ta.conv),fmtPct(tb.conv),dv(ta.conv,tb.conv,false)],
  ['CPL',fmtBRL2(ta.cpl),fmtBRL2(tb.cpl),dv(ta.cpl,tb.cpl,true)],
  ['Leads',fmtN(ta.leads),fmtN(tb.leads),dv(ta.leads,tb.leads,false)]];
 const kpiTable=`<table><thead><tr><th class="l">Métrica</th><th>${state.cmpA.replace('LS-','')}</th><th>${state.cmpB.replace('LS-','')}</th><th>Variação</th></tr></thead><tbody>${mrows.map(r=>`<tr><td class="l">${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td></tr>`).join('')}</tbody></table>`;
 // per-creative compare
 let mapA={},mapB={};A.forEach(r=>mapA[r.plat+'::'+r.code]=r);B.forEach(r=>mapB[r.plat+'::'+r.code]=r);
 let keys=[...new Set([...Object.keys(mapA),...Object.keys(mapB)])];
 let comp=keys.map(kk=>{const a=mapA[kk],b=mapB[kk],base=a||b;const ra=a&&a.custo>0?a.roas:null,rb=b&&b.custo>0?b.roas:null;
   return {code:base.code,plat:base.plat,ra,rb,va:a?a.vendas:0,vb:b?b.vendas:0,la:a?a.leads:0,lb:b?b.leads:0,
     delta:(ra!=null&&rb!=null&&a.leads>=80&&b.leads>=80)?rb-ra:null};});
 comp.sort((x,y)=>(y.va+y.vb)-(x.va+x.vb));
 const cbody=comp.map(c=>{
   const dcell=c.delta==null?'<span class="note">—</span>':`<span class="${c.delta>=0?'up':'down'}">${c.delta>=0?'+':''}${c.delta.toFixed(2)}</span>`;
   return `<tr data-code="${c.code}" data-plat="${c.plat}">
    <td class="l"><span class="tagp ${c.plat}">${c.plat==='google'?'G':'M'}</span> <b>${c.code}</b></td>
    <td style="color:${c.ra!=null?roasColor(c.ra):'var(--muted)'}">${c.ra!=null?c.ra.toFixed(2):'—'}</td>
    <td style="color:${c.rb!=null?roasColor(c.rb):'var(--muted)'}">${c.rb!=null?c.rb.toFixed(2):'—'}</td>
    <td class="roasbadge">${dcell}</td>
    <td>${fmtN(c.va)}</td><td>${fmtN(c.vb)}</td></tr>`;}).join('');
 return `<div class="cmpgrid" style="margin-bottom:14px">
   <div class="card panel"><div class="toolbar"><label class="note" style="font-weight:600">Lançamento A</label><select id="cmpAsel">${optA}</select></div></div>
   <div class="card panel"><div class="toolbar"><label class="note" style="font-weight:600">Lançamento B</label><select id="cmpBsel">${optB}</select></div></div>
  </div>
  <div class="card panel" style="margin-bottom:14px"><h2>Resumo do período</h2>${kpiTable}<p class="note">Variação = B em relação a A. Verde indica melhora (para CPL, queda é melhora).</p></div>
  <div class="card chartbox" style="margin-bottom:14px"><h3>ROAS por criativo: ${state.cmpA.replace('LS-','')} vs ${state.cmpB.replace('LS-','')}</h3><div style="position:relative;height:280px"><canvas id="cmpchart" role="img" aria-label="Comparativo de ROAS por criativo entre dois lançamentos"></canvas></div></div>
  <div class="card panel"><h2>Criativos: A vs B</h2><div class="tblwrap"><table><thead><tr><th class="l">Criativo</th><th>ROAS A</th><th>ROAS B</th><th>Δ ROAS</th><th>Vendas A</th><th>Vendas B</th></tr></thead><tbody>${cbody}</tbody></table></div>
   <p class="note">Δ ROAS só é calculado quando o criativo teve ≥ 80 leads nos dois lançamentos (senão fica "—"). Ordenado por volume total de vendas.</p>
  </div>`;
}

   scales:{x:{title:{display:true,text:'ROAS'},grid:{color:GC()}},y:{grid:{display:false}}}}}));

function initSim(){
 const c=DATA[state.sim.plat].creatives.find(x=>x.code===state.sim.code);
 document.getElementById('simbase').innerHTML=`Histórico: CPL ${fmtBRL2(c.cpl)} · conversão ${c.conv.toFixed(2)}% · ROAS ${c.roas.toFixed(2)}`;
 const defBudget=Math.max(5000,Math.round(c.custo/1000)*1000);
 const S={budget:defBudget,cpl:c.cpl,conv:c.conv,ticket:TICKET};
 const ctr=document.getElementById('simctrls');
 const rows=[
  ['budget','Orçamento',1000,200000,1000,v=>fmtBRL(v)],
  ['cpl','CPL (R$)',0.5,15,0.05,v=>fmtBRL2(v)],
  ['conv','Conversão (%)',0.05,3,0.01,v=>v.toFixed(2)+'%'],
  ['ticket','Ticket (R$)',197,4997,10,v=>fmtBRL(v)]];
 ctr.innerHTML=rows.map(r=>`<div class="simrow"><label>${r[1]}</label><input type="range" id="s_${r[0]}" min="${r[2]}" max="${r[3]}" step="${r[4]}" value="${S[r[0]]}"><span class="out" id="o_${r[0]}"></span></div>`).join('');
 function recalc(){
  const leads=S.budget/S.cpl, vendas=leads*S.conv/100, receita=vendas*S.ticket, roas=receita/S.budget, lucro=receita-S.budget, cac=vendas>0?S.budget/vendas:0;
  rows.forEach(r=>document.getElementById('o_'+r[0]).textContent=r[5](S[r[0]]));
  document.getElementById('simout').innerHTML=[
   ['Leads',fmtN(leads),''],['Vendas',vendas.toFixed(1),''],

   ['Lucro bruto',fmtBRL(lucro),lucro>=0?'var(--green)':'var(--red)'],['CAC',fmtBRL2(cac),'']
  ].map(k=>`<div class="mini"><div class="lab">${k[0]}</div><div class="val" ${k[2]?`style="color:${k[2]}"`:''}>${k[1]}</div></div>`).join('');
  drawSimChart(S);
 }
 rows.forEach(r=>{const el=document.getElementById('s_'+r[0]);el.addEventListener('input',()=>{S[r[0]]=+el.value;recalc();});});
 document.getElementById('simsel').addEventListener('change',e=>{const[p,cd]=e.target.value.split('::');state.sim={plat:p,code:cd};render();});
 recalc();
}

 charts.push(new Chart(document.getElementById('simChart'),{type:'bar',

   {label:'Conv. necessária',data:need.map(n=>+n.toFixed(3)),backgroundColor:metas.map(m=> (S.conv>=m*S.cpl/S.ticket*100)?'#0E9F6E':'#C0322B')},
  ]},

 rows.sort((a,b)=>(b[state.sort.key2||'roas']-a[state.sort.key2||'roas']));
 const cols=[['code','Criativo','l'],['pub','Público','l'],['leads','Leads'],['vendas','Vendas'],['conv','Conv.'],['cpl','CPL'],['roas','ROAS']];
 const th=cols.map(c=>`<th class="${c[2]||''}" data-k2="${c[0]}">${c[1]}</th>`).join('');
 const body=rows.map(c=>`<tr>
   <td class="l"><span class="tagp ${c.plat}">${c.plat==='google'?'G':'M'}</span> <b>${c.code}</b></td>
   <td class="l">${c.pub}</td><td>${fmtN(c.leads)}</td><td>${fmtN(c.vendas)}</td><td>${c.conv.toFixed(2)}%</td><td>${fmtBRL2(c.cpl)}</td>
   <td class="roasbadge" style="color:${roasColor(c.roas)}">${c.roas.toFixed(2)}</td></tr>`).join('');
 return `<div class="card panel">
  <div class="toolbar"><input type="search" id="q" placeholder="Buscar criativo ou público" value="${state.q}"><span class="note">${rows.length} combinações com ≥ ${state.plat==='meta'?300:300} leads · ordenadas por ROAS</span></div>
  <div class="tblwrap"><table><thead><tr>${th}</tr></thead><tbody>${body}</tbody></table></div>
  <div class="legend"><span><i style="background:var(--green)"></i>ROAS ≥ 3</span><span><i style="background:var(--amber)"></i>2–3</span><span><i style="background:var(--red)"></i>&lt; 2</span></div>
 </div>`;
}

/* ---------- events ---------- */
function attachTableSort(){
 document.querySelectorAll('th[data-k]').forEach(th=>th.onclick=()=>{const k=th.dataset.k;state.sort.dir=(state.sort.key===k)?-state.sort.dir:-1;state.sort.key=k;render();});
 document.querySelectorAll('th[data-k2]').forEach(th=>th.onclick=()=>{state.sort.key2=th.dataset.k2;render();});
 document.querySelectorAll('th[data-kl]').forEach(th=>th.onclick=()=>{const k=th.dataset.kl;state.sortL.dir=(state.sortL.key===k)?-state.sortL.dir:-1;state.sortL.key=k;render();});
 document.querySelectorAll('button[data-lm]').forEach(b=>b.onclick=()=>{state.launchMode=b.dataset.lm;render();});
 document.querySelectorAll('.chip[data-l]').forEach(ch=>ch.onclick=()=>{const L=ch.dataset.l;const i=state.launches.indexOf(L);if(i>=0){if(state.launches.length>1)state.launches.splice(i,1);}else state.launches.push(L);render();});
 const lall=document.getElementById('lall');if(lall)lall.onclick=()=>{state.launches=launchList().slice();render();};
 const llast=document.getElementById('llast');if(llast)llast.onclick=()=>{const L=launchList();state.launches=[L[L.length-1]];render();};
 const ca=document.getElementById('cmpAsel');if(ca)ca.onchange=e=>{state.cmpA=e.target.value;render();};
 const cb2=document.getElementById('cmpBsel');if(cb2)cb2.onchange=e=>{state.cmpB=e.target.value;render();};
 const lsel=document.getElementById('lsel');if(lsel)lsel.onchange=e=>{state.launch=e.target.value;render();};
 const q=document.getElementById('q');if(q)q.oninput=e=>{state.q=e.target.value;const pos=e.target.selectionStart;render();const nq=document.getElementById('q');if(nq){nq.focus();nq.setSelectionRange(pos,pos);}};
 const stt=document.getElementById('stt');if(stt)stt.onchange=e=>{state.status=e.target.value;render();};
 document.querySelectorAll('tr[data-code]').forEach(tr=>tr.onclick=()=>openCreative(tr.dataset.plat,tr.dataset.code));
}
document.getElementById('platseg').onclick=e=>{if(e.target.dataset.p){state.plat=e.target.dataset.p;state.sim=null;render();}};
document.getElementById('tabs').onclick=e=>{if(e.target.dataset.v){state.view=e.target.dataset.v;render();}};
document.getElementById('dbg').onclick=closeDrawer;
document.getElementById('themebtn').onclick=()=>setTheme(isDark()?'light':'dark');
let initT='light';try{initT=localStorage.getItem('dashtheme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');}catch(e){}
document.documentElement.dataset.theme=initT;
document.getElementById('themebtn').innerHTML=(initT==='dark')?SUN:MOON;
applyChartDefaults();
render();
</script>
</body>
</html>
